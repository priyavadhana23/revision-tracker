<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#8B5CF6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StudyTracker" />
  <link rel="manifest" href="manifest.json" />
  <title>Study Tracker — 1·4·7 Rule</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-hover: #121212;
      --border: #222222;
      --border-focus: #444444;
      --text: #FAFAFA;
      --text-dim: #888888;
      --primary: #FAFAFA;
      --primary-hover: #DDDDDD;
      --primary-text: #000000;
      --success: #10B981;
      --success-dim: rgba(16, 185, 129, 0.1);
      --warning: #F59E0B;
      --warning-dim: rgba(245, 158, 11, 0.1);
      --danger: #EF4444;
      --danger-dim: rgba(239, 68, 68, 0.1);
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 20px 40px;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, .app-title { font-weight: 600; letter-spacing: -0.02em; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

    .site-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 0; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 50;
      margin-bottom: 40px;
    }

    .app-title { font-size: 1.1rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #userInfo { font-size: 0.85rem; color: var(--text-dim); }

    .btn {
      padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px;
    }

    .btn-primary { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

    .btn-outline { background: transparent; color: var(--text); }
    .btn-outline:hover { background: var(--surface-hover); }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

    .container { max-width: 900px; margin: 0 auto; }
    
    header.section-header { margin-bottom: 32px; }
    header.section-header h2 { font-size: 1.4rem; margin-bottom: 4px; color: var(--text); }
    header.section-header p { color: var(--text-dim); font-size: 0.9rem; }

    .add-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 16px; display: flex; gap: 12px; margin-bottom: 24px;
      align-items: center; flex-wrap: wrap; transition: border-color 0.15s ease;
    }
    .add-card:focus-within { border-color: var(--border-focus); }

    .input-field {
      padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: transparent; color: var(--text); font-size: 0.9rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.15s ease;
    }
    .input-field:focus { border-color: var(--text-dim); }
    #topicInput { flex: 1; min-width: 200px; }

    .action-bars { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .btn-donext, .btn-planner { border-color: var(--border); }
    .btn-donext:hover, .btn-planner:hover { border-color: var(--text-dim); }

    .panel {
      display: none; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px;
    }
    .panel h3 { font-size: 1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }

    #overdueBanner {
      display: none; background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--warning); border-radius: var(--radius-md); 
      padding: 16px; margin-bottom: 24px;
    }
    .banner-title { color: var(--warning); font-size: 0.9rem; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    
    .overdue-item, .donext-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .overdue-item:last-child, .donext-item:last-child { border-bottom: none; padding-bottom: 0; }
    .overdue-topic, .donext-topic { color: var(--text); font-weight: 500; flex: 1; }
    .overdue-info, .donext-date { color: var(--text-dim); font-size: 0.85rem; }
    .donext-num { color: var(--text-dim); font-size: 0.8rem; min-width: 20px; }
    
    .pill { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
    .pill-warning { background: var(--warning-dim); color: var(--warning); }
    .pill-success { background: var(--success-dim); color: var(--success); }
    .pill-primary { background: var(--surface-hover); color: var(--text); border: 1px solid var(--text-dim); }

    .planner-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: flex-start; }
    .planner-row textarea {
      flex: 1; min-width: 250px; height: 80px; resize: vertical; color: var(--text); background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.15s ease;
    }
    .planner-row textarea:focus { border-color: var(--text-dim); }

    .plan-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-bottom: 12px; }
    .plan-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; font-size: 0.9rem; }
    .plan-card-date { font-weight: 500; color: var(--text); }
    .plan-progress { margin-left: auto; color: var(--text-dim); }
    .plan-progress.all-done { color: var(--success); }
    .plan-delete-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 4px; transition: color 0.15s ease; display: flex; }
    .plan-delete-btn:hover { color: var(--text); background: var(--border); }
    
    .plan-checklist { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .plan-check-item { display: flex; align-items: flex-start; gap: 10px; }

    /* Minimal Checkbox */
    .cb-wrapper { display: flex; align-items: center; cursor: pointer; position: relative; user-select: none; font-size: 0.9rem; color: var(--text); gap: 10px; }
    .cb-wrapper input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
    .cb-mark {
      height: 16px; width: 16px; background-color: transparent; border: 1px solid var(--text-dim); border-radius: 3px;
      display: flex; align-items: center; justify-content: center; transition: all 0.1s ease; flex-shrink: 0;
    }
    .cb-wrapper:hover .cb-mark { border-color: var(--text); }
    .cb-wrapper input:checked ~ .cb-mark { background-color: var(--text); border-color: var(--text); }
    .cb-mark::after {
      content: ""; display: none; width: 4px; height: 8px; border: solid var(--bg); border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg); margin-bottom: 1px;
    }
    .cb-wrapper input:checked ~ .cb-mark::after { display: block; }
    .cb-wrapper input:checked ~ .cb-text { text-decoration: line-through; color: var(--text-dim); }

    .tracker-list { display: flex; flex-direction: column; gap: 16px; }
    
    .topic-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; }
    
    .t-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .t-title-wrapper { display: flex; align-items: center; gap: 12px; }
    .t-index { color: var(--text-dim); font-weight: 500; font-size: 0.85rem; }
    .t-title { font-size: 1rem; font-weight: 500; color: var(--text); }
    
    .t-actions { display: flex; gap: 6px; align-items: center; }
    .btn-icon {
      background: transparent; border: 1px solid transparent; color: var(--text-dim);
      width: 28px; height: 28px; border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--border); color: var(--text); }
    .btn-icon.has-notes { color: var(--text); }
    
    .t-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 8px;}
    .day-box { background: var(--bg); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
    .day-label { font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center;}
    
    .t-footer { font-size: 0.85rem; color: var(--text-dim); display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);}
    .t-footer a { color: var(--text); text-decoration: none; }
    .t-footer a:hover { text-decoration: underline; }
    .notes-preview-text { display: inline-block; max-width: 600px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.95rem; display: flex; flex-direction: column; align-items: center; gap: 12px;}
    .empty-state svg { color: var(--border-focus); margin-bottom: 4px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100;
      align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s ease;
    }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-overlay.open .modal { opacity: 1; transform: scale(1); }

    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
      padding: 24px; width: 460px; max-width: 90vw; opacity: 0; transform: scale(0.98); transition: all 0.15s ease;
    }
    .modal h3 { color: var(--text); margin-bottom: 16px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
    .modal textarea {
      width: 100%; height: 160px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 0.9rem; padding: 12px;
      resize: vertical; outline: none; transition: border-color 0.15s ease; font-family: 'Inter', sans-serif;
    }
    .modal textarea:focus { border-color: var(--text-dim); }
    .modal-hint { font-size: 0.8rem; color: var(--text-dim); margin: 8px 0 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="app-title">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    StudyTracker
  </div>
  <div class="header-right">
    <span id="userInfo">Offline Mode</span>
    <button id="authBtn" class="btn btn-primary btn-sm">Sign In</button>
  </div>
</header>

<div class="container">
  <header class="section-header">
    <h2>1 · 4 · 7 Protocol</h2>
    <p>Spaced repetition tracking for maximum retention</p>
  </header>

  <div id="overdueBanner">
    <div class="banner-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      Action Required: Missed Revisions
    </div>
    <div id="overdueList"></div>
  </div>

  <div class="action-bars">
    <button class="btn btn-outline btn-donext" onclick="toggleDoNext()">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
      Revision Queue
    </button>
    <button class="btn btn-outline btn-planner" onclick="togglePlanner()">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      Daily Planner
    </button>
  </div>

  <div id="doNextPanel" class="panel">
    <h3><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> Up Next</h3>
    <div id="doNextList"></div>
  </div>

  <div id="plannerPanel" class="panel">
    <h3><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg> Plan Your Day</h3>
    <div class="planner-row">
      <input type="date" id="planDate" class="input-field" />
      <textarea id="planText" placeholder="What chapters, topics, or tasks are you attacking today?"></textarea>
      <button class="btn btn-primary" onclick="savePlan()">Save Plan</button>
    </div>
    <div id="planList"></div>
  </div>

  <div class="add-card">
    <input id="topicInput" class="input-field" type="text" placeholder="New Topic (e.g. Backpropagation)" />
    <input id="dateInput" class="input-field" type="date" />
    <button class="btn btn-primary" onclick="addEntry()">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      Track Setup
    </button>
  </div>

  <div id="trackerList" class="tracker-list">
    <div id="emptyState" class="empty-state">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
      Your queue is empty. Add your first study topic.
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCSNHm77HEIJBTtBu7vTitKewogcQ0dgrI",
    authDomain: "revision-tracker-e917a.firebaseapp.com",
    projectId: "revision-tracker-e917a",
    storageBucket: "revision-tracker-e917a.firebasestorage.app",
    messagingSenderId: "784832370803",
    appId: "1:784832370803:web:9d26899629acc207977206"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let unsubscribeDoc = null;
  let localData = [];
  let localPlans = {};

  const KEY = 'study_tracker_v1';
  const PLAN_KEY = 'study_planner_v1';

  document.getElementById('authBtn').addEventListener('click', async () => {
    if (currentUser) {
      await signOut(auth);
    } else {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        alert("Sign in failed: " + err.message);
      }
    }
  });

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    const authBtn = document.getElementById('authBtn');
    const userInfo = document.getElementById('userInfo');

    if (user) {
      authBtn.textContent = 'Sign Out';
      userInfo.textContent = user.email;
      await migrateLocalData(user.uid);
      listenToData(user.uid);
    } else {
      authBtn.textContent = 'Sign In';
      userInfo.textContent = 'Offline Mode';
      if (unsubscribeDoc) {
        unsubscribeDoc();
        unsubscribeDoc = null;
      }
      localData = JSON.parse(localStorage.getItem(KEY) || '[]');
      localPlans = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
      fullRender();
    }
  });

  async function migrateLocalData(uid) {
    const oldTopics = JSON.parse(localStorage.getItem(KEY) || '[]');
    const oldPlans = JSON.parse(localStorage.getItem(PLAN_KEY) || '{}');
    if (oldTopics.length > 0 || Object.keys(oldPlans).length > 0) {
      const docRef = doc(db, 'users', uid);
      const docSnap = await getDoc(docRef);
      if (!docSnap.exists() || (!docSnap.data().topics && !docSnap.data().plans)) {
        await setDoc(docRef, { topics: oldTopics, plans: oldPlans }, { merge: true });
        localStorage.removeItem(KEY);
        localStorage.removeItem(PLAN_KEY);
      }
    }
  }

  function listenToData(uid) {
    const docRef = doc(db, 'users', uid);
    unsubscribeDoc = onSnapshot(docRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        localData = data.topics || [];
        localPlans = data.plans || {};
      } else {
        localData = [];
        localPlans = {};
      }
      fullRender();
    });
  }

  function fullRender() {
    render();
    renderBanner();
    updateDoNextIfOpen();
    renderPlans();
  }

  function load() {
    return localData;
  }

  function save(newData) {
    localData = newData;
    if (currentUser) {
      setDoc(doc(db, 'users', currentUser.uid), { topics: localData }, { merge: true });
    } else {
      localStorage.setItem(KEY, JSON.stringify(localData));
      fullRender();
    }
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function fmt(dateStr) {
    if (!dateStr) return '—';
    const [y, m, d] = dateStr.split('-');
    return `${d}/${m}/${y}`;
  }

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  function dueBadge(dateStr, done) {
    if (done) return `<span class="pill pill-success">✓ Done</span>`;
    if (!dateStr) return '';
    const t = today();
    if (dateStr === t) return `<span class="pill pill-primary">Today</span>`;
    if (dateStr < t)  return `<span class="pill pill-warning">Overdue</span>`;
    return '';
  }

  function render() {
    const data = load();
    const list = document.getElementById('trackerList');
    list.innerHTML = '';
    
    if (!data.length) {
      list.innerHTML = `
        <div id="emptyState" class="empty-state">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
          Your queue is empty. Add your first study topic to initiate tracking.
        </div>
      `;
      return;
    }

    data.forEach((e, i) => {
      const card = document.createElement('div');
      card.className = 'topic-card';
      
      card.innerHTML = `
        <div class="t-header">
          <div class="t-title-wrapper">
            <span class="t-index">${String(i + 1).padStart(2, '0')}</span>
            <span class="t-title">${escHtml(e.topic)}</span>
          </div>
          <div class="t-actions">
            <button class="btn-icon ${e.notes ? 'has-notes' : ''}" onclick="openNotes(${i})" title="Notes">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
            </button>
            <button class="btn-icon btn-delete" onclick="remove(${i})" title="Delete">
              <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>
        </div>
        
        <div class="t-grid">
          <div class="day-box">
            <div class="day-label">
              <span>Day 1: ${fmt(e.date)}</span>
              ${dueBadge(e.date, e.d1)}
            </div>
            <label class="cb-wrapper">
              <input type="checkbox" ${e.d1 ? 'checked' : ''} onchange="toggle(${i},'d1',this.checked)" />
              <div class="cb-mark"></div>
              <span class="cb-text">Revised</span>
            </label>
          </div>
          
          <div class="day-box">
            <div class="day-label">
              <span>Day 4: ${fmt(e.date4)}</span>
              ${dueBadge(e.date4, e.d4)}
            </div>
            <label class="cb-wrapper">
              <input type="checkbox" ${e.d4 ? 'checked' : ''} onchange="toggle(${i},'d4',this.checked)" />
              <div class="cb-mark"></div>
              <span class="cb-text">Revised</span>
            </label>
          </div>
          
          <div class="day-box">
            <div class="day-label">
              <span>Day 7: ${fmt(e.date7)}</span>
              ${dueBadge(e.date7, e.d7)}
            </div>
            <label class="cb-wrapper">
              <input type="checkbox" ${e.d7 ? 'checked' : ''} onchange="toggle(${i},'d7',this.checked)" />
              <div class="cb-mark"></div>
              <span class="cb-text">Revised</span>
            </label>
          </div>
        </div>
        
        ${e.notes ? `
          <div class="t-footer">
            <svg style="flex-shrink:0" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="notes-preview-text">${linkify(escHtml(e.notes))}</span>
          </div>
        ` : ''}
      `;
      list.appendChild(card);
    });
  }

  function addEntry() {
    const topic = document.getElementById('topicInput').value.trim();
    const date  = document.getElementById('dateInput').value;
    if (!topic || !date) return alert('Please enter both topic and date.');

    const data = load();
    data.push({
      topic,
      date,
      date4: addDays(date, 3),
      date7: addDays(date, 6),
      d1: false, d4: false, d7: false, notes: ''
    });
    save(data);
    document.getElementById('topicInput').value = '';
    render();
  }

  function updateDoNextIfOpen() {
    const panel = document.getElementById('doNextPanel');
    if (panel.style.display === 'block') {
      panel.style.display = 'none';
      toggleDoNext();
    }
  }

  function toggle(i, key, val) {
    const data = load();
    data[i][key] = val;
    save(data);
    render();
    renderBanner();
    updateDoNextIfOpen();
  }

  function remove(i) {
    const data = load();
    data.splice(i, 1);
    save(data);
    render();
    renderBanner();
    updateDoNextIfOpen();
  }

  function getOverdue() {
    const t = today();
    const items = [];
    load().forEach((e, i) => {
      if (!e.d4 && e.date4 < t) items.push({ i, topic: e.topic, date: e.date4, day: 'Day 4', daysAgo: daysDiff(e.date4, t) });
      if (!e.d7 && e.date7 < t) items.push({ i, topic: e.topic, date: e.date7, day: 'Day 7', daysAgo: daysDiff(e.date7, t) });
    });
    return items.sort((a, b) => a.date.localeCompare(b.date));
  }

  function getPending() {
    const t = today();
    const items = [];
    load().forEach((e, i) => {
      if (!e.d4) items.push({ i, topic: e.topic, date: e.date4, day: 'Day 4', overdue: e.date4 < t });
      if (!e.d7) items.push({ i, topic: e.topic, date: e.date7, day: 'Day 7', overdue: e.date7 < t });
    });
    return items.sort((a, b) => a.date.localeCompare(b.date));
  }

  function daysDiff(from, to) {
    return Math.round((new Date(to) - new Date(from)) / 86400000);
  }

  function renderBanner() {
    const overdue = getOverdue();
    const banner  = document.getElementById('overdueBanner');
    const list    = document.getElementById('overdueList');
    if (!overdue.length) { banner.style.display = 'none'; return; }
    banner.style.display = 'block';
    list.innerHTML = overdue.map(o => `
      <div class="overdue-item">
        <span class="overdue-topic">${escHtml(o.topic)}</span>
        <span class="overdue-info">${fmt(o.date)}</span>
        <span class="pill pill-warning">${o.day} — ${o.daysAgo}d ago</span>
      </div>
    `).join('');
  }

  function toggleDoNext() {
    const panel = document.getElementById('doNextPanel');
    const open  = panel.style.display === 'block';
    if (open) { panel.style.display = 'none'; return; }
    const pending = getPending();
    const list    = document.getElementById('doNextList');
    if (!pending.length) {
      list.innerHTML = `<div class="empty-state" style="padding:20px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        All caught up! Nothing pending.
      </div>`;
    } else {
      list.innerHTML = pending.map((p, idx) => `
        <div class="donext-item">
          <span class="donext-num">${String(idx + 1).padStart(2, '0')}</span>
          <span class="donext-topic">${escHtml(p.topic)}</span>
          <span class="donext-date">${fmt(p.date)}</span>
          <span class="pill ${p.overdue ? 'pill-warning' : 'pill-success'}">${p.day}${p.overdue ? ' ⚠' : ''}</span>
        </div>
      `).join('');
    }
    panel.style.display = 'block';
  }

  // ── Daily Planner ──
  function loadPlans() {
    return localPlans;
  }

  function savePlans(newPlans) {
    localPlans = newPlans;
    if (currentUser) {
      setDoc(doc(db, 'users', currentUser.uid), { plans: localPlans }, { merge: true });
    } else {
      localStorage.setItem(PLAN_KEY, JSON.stringify(localPlans));
      fullRender();
    }
  }

  function togglePlanner() {
    const panel = document.getElementById('plannerPanel');
    const open  = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    if (!open) renderPlans();
  }

  function savePlan() {
    const date = document.getElementById('planDate').value;
    const text = document.getElementById('planText').value.trim();
    if (!date || !text) return alert('Please select a date and write your plan.');
    const plans = loadPlans();
    const existing = plans[date] || [];
    const newItems = text.split('\n').map(l => l.trim()).filter(Boolean).map(l => ({ text: l, done: false }));
    plans[date] = existing.concat(newItems);
    savePlans(plans);
    document.getElementById('planText').value = '';
    renderPlans();
  }

  function togglePlanItem(date, idx, val) {
    const plans = loadPlans();
    plans[date][idx].done = val;
    savePlans(plans);
    renderPlans();
  }

  function deletePlan(date) {
    const plans = loadPlans();
    delete plans[date];
    savePlans(plans);
    renderPlans();
  }

  function renderPlans() {
    const plans = loadPlans();
    const list  = document.getElementById('planList');
    const t     = today();
    const sorted = Object.keys(plans).sort((a, b) => b.localeCompare(a));
    if (!sorted.length) {
      list.innerHTML = '<div class="empty-state" style="padding:40px 20px;">No plans saved yet.<br>Pick a date and write your plan above.</div>';
      return;
    }
    list.innerHTML = sorted.map(date => {
      const items = plans[date];
      const done  = items.filter(x => x.done).length;
      const allDone = done > 0 && done === items.length;
      const checkItems = items.map((item, idx) => `
        <li class="plan-check-item">
          <label class="cb-wrapper">
            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="togglePlanItem('${date}',${idx},this.checked)" />
            <div class="cb-mark"></div>
            <span class="cb-text">${escHtml(item.text)}</span>
          </label>
        </li>
      `).join('');
      return `
        <div class="plan-card">
          <div class="plan-card-header">
            <span class="plan-card-date">${fmt(date)}</span>
            ${date === t ? '<span class="pill pill-primary">Today</span>' : ''}
            <span class="plan-progress ${allDone ? 'all-done' : ''}">${allDone ? '✓ All done' : `${done}/${items.length} done`}</span>
            <button class="plan-delete-btn" onclick="deletePlan('${date}')" title="Delete">
              <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
          </div>
          <ul class="plan-checklist">${checkItems}</ul>
        </div>
      `;
    }).join('');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── Notes modal ──
  let editingIndex = null;

  function linkify(text) {
    return text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  }

  function openNotes(i) {
    editingIndex = i;
    const data = load();
    document.getElementById('notesArea').value = data[i].notes || '';
    document.getElementById('modalTitle').innerHTML = `
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
      ${escHtml(data[i].topic)}
    `;
    document.getElementById('notesModal').classList.add('open');
    document.getElementById('notesArea').focus();
  }

  function saveNotes() {
    const data = load();
    data[editingIndex].notes = document.getElementById('notesArea').value.trim();
    save(data);
    closeModal();
    render();
  }

  function closeModal() {
    document.getElementById('notesModal').classList.remove('open');
    editingIndex = null;
  }

  // close on overlay click
  document.getElementById('notesModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // set default date to today
  document.getElementById('dateInput').value = today();
  document.getElementById('planDate').value  = today();

  // allow Enter key to add
  document.getElementById('topicInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEntry();
  });

  window.toggleDoNext = toggleDoNext;
  window.togglePlanner = togglePlanner;
  window.savePlan = savePlan;
  window.addEntry = addEntry;
  window.toggle = toggle;
  window.openNotes = openNotes;
  window.remove = remove;
  window.closeModal = closeModal;
  window.saveNotes = saveNotes;
  window.togglePlanItem = togglePlanItem;
  window.deletePlan = deletePlan;

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }
</script>

<!-- Notes Modal -->
<div class="modal-overlay" id="notesModal">
  <div class="modal">
    <h3 id="modalTitle">
      <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
      Notes / Links
    </h3>
    <textarea id="notesArea" placeholder="Paste links, write notes, add references..."></textarea>
    <p class="modal-hint">URLs will be auto-linked when displayed in the tracker.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>
</body>
</html>
